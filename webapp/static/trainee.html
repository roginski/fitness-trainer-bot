<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>My Workout</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:    var(--tg-theme-bg-color, #ffffff);
      --bg2:   var(--tg-theme-secondary-bg-color, #f1f1f1);
      --text:  var(--tg-theme-text-color, #000000);
      --hint:  var(--tg-theme-hint-color, #999999);
      --btn:   var(--tg-theme-button-color, #2481cc);
      --btn-t: var(--tg-theme-button-text-color, #ffffff);
      --green: #34c759;
      --red:   #ff3b30;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      padding: 0 16px 88px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--bg2);
      margin: 0 -16px 20px;
      padding: 0 16px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 14px 0 12px;
      font-size: 15px;
      font-weight: 500;
      color: var(--hint);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab.active { color: var(--btn); border-bottom-color: var(--btn); font-weight: 600; }

    /* ── Exercise card (workout tab) ── */
    .exercise-card {
      background: var(--bg2);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px;
      cursor: pointer;
      user-select: none;
    }
    .card-title-left { display: flex; align-items: center; gap: 10px; }
    .status-icon { font-size: 20px; flex-shrink: 0; }
    .ex-num { font-size: 12px; color: var(--hint); }
    .ex-name { font-weight: 600; font-size: 15px; }
    .chevron { color: var(--hint); font-size: 18px; transition: transform 0.2s; }
    .chevron.open { transform: rotate(90deg); }
    .card-body { padding: 0 14px 14px; display: none; }
    .card-body.open { display: block; }

    /* ── Sets grid ── */
    .sets-grid {
      display: grid;
      grid-template-columns: 32px 1fr 1fr;
      gap: 6px 8px;
      align-items: center;
      margin-bottom: 14px;
    }
    .col-head { font-size: 11px; color: var(--hint); text-transform: uppercase; letter-spacing: 0.5px; }
    .set-num { color: var(--hint); font-size: 13px; text-align: center; }
    .set-input-wrap { position: relative; }
    .set-planned { font-size: 11px; color: var(--hint); position: absolute; top: -16px; left: 8px; }
    .set-input {
      width: 100%; background: var(--bg); border: 1.5px solid transparent;
      border-radius: 8px; padding: 8px 10px; color: var(--text);
      font-size: 14px; outline: none; transition: border-color 0.15s;
    }
    .set-input:focus { border-color: var(--btn); }
    .set-input.logged { border-color: var(--green); }

    /* ── Comment ── */
    .comment-label { font-size: 12px; color: var(--hint); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .comment-input {
      width: 100%; background: var(--bg); border: 1.5px solid transparent;
      border-radius: 8px; padding: 10px 12px; color: var(--text);
      font-size: 14px; outline: none; resize: none; min-height: 72px;
      font-family: inherit; transition: border-color 0.15s;
    }
    .comment-input:focus { border-color: var(--btn); }
    .btn-log {
      width: 100%; background: var(--btn); color: var(--btn-t);
      border: none; border-radius: 10px; padding: 11px;
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 14px;
    }
    .divider { height: 1px; background: var(--bg); margin: 14px 0; }

    /* ── Bottom bar ── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px; background: var(--bg);
      border-top: 1px solid var(--bg2);
    }
    .btn-complete {
      width: 100%; background: var(--green); color: #fff;
      border: none; border-radius: 10px; padding: 13px;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .btn-complete:disabled { opacity: 0.35; cursor: default; }

    /* ── History cards ── */
    .history-card {
      background: var(--bg2);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .history-card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px;
      cursor: pointer;
      user-select: none;
    }
    .history-date { font-weight: 600; font-size: 15px; }
    .history-meta { font-size: 13px; color: var(--hint); margin-top: 2px; }
    .history-body { padding: 0 14px 14px; display: none; }
    .history-body.open { display: block; }

    /* ── History sets table ── */
    .history-sets {
      display: grid;
      grid-template-columns: 28px 1fr 1fr 1fr;
      gap: 4px 8px;
      align-items: center;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .history-sets .col-head { font-size: 11px; }
    .delta { font-size: 12px; font-weight: 600; }
    .delta.up { color: var(--green); }
    .delta.down { color: var(--red); }

    /* ── States ── */
    .empty { text-align: center; color: var(--hint); padding: 48px 0; }
    .empty-icon { font-size: 40px; margin-bottom: 8px; }
    .spinner { text-align: center; padding: 48px; color: var(--hint); }
    .done-banner { text-align: center; padding: 20px; color: var(--green); font-weight: 600; font-size: 16px; }
    .subtitle { color: var(--hint); font-size: 13px; padding: 8px 0 4px; }
  </style>
</head>
<body>

<div class="tabs">
  <div class="tab active" id="tab-workout" onclick="switchTab('workout')">💪 Workout</div>
  <div class="tab" id="tab-history" onclick="switchTab('history')">📅 History</div>
</div>

<div id="view-workout">
  <div id="main-content"><div class="spinner">Loading…</div></div>
</div>

<div id="view-history" style="display:none">
  <div id="history-content"><div class="spinner">Loading…</div></div>
</div>

<div class="bottom-bar" id="bottom-bar">
  <button class="btn-complete" id="btn-complete" disabled onclick="completeWorkout()">
    Complete Workout
  </button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();

  function authHeaders(json = false) {
    const h = { 'ngrok-skip-browser-warning': '1' };
    if (tg.initData) {
      h['X-Telegram-Init-Data'] = tg.initData;
    } else {
      const params = new URLSearchParams(location.search);
      const token = params.get('token');
      const debugId = params.get('user_id') || tg.initDataUnsafe?.user?.id;
      if (token) h['X-Auth-Token'] = token;
      else if (debugId) h['X-Debug-User-Id'] = String(debugId);
    }
    if (json) h['Content-Type'] = 'application/json';
    return h;
  }

  const H = authHeaders();
  const HJ = authHeaders(true);

  let sessionId = null;
  let exercises = [];
  let historyLoaded = false;

  // ── Tabs ──────────────────────────────────────────────────────────────────

  function switchTab(tab) {
    document.getElementById('tab-workout').classList.toggle('active', tab === 'workout');
    document.getElementById('tab-history').classList.toggle('active', tab === 'history');
    document.getElementById('view-workout').style.display = tab === 'workout' ? '' : 'none';
    document.getElementById('view-history').style.display = tab === 'history' ? '' : 'none';
    document.getElementById('bottom-bar').style.display = tab === 'workout' ? '' : 'none';
    if (tab === 'history' && !historyLoaded) loadHistory();
  }

  // ── Workout tab ───────────────────────────────────────────────────────────

  async function init() {
    const res = await fetch(`/api/workout/current`, { headers: H });
    if (!res.ok) { showError('Failed to load workout.'); return; }
    const data = await res.json();

    if (!data.workout) {
      document.getElementById('main-content').innerHTML =
        `<div class="empty"><div class="empty-icon">🏖️</div><p>Your trainer hasn't published a workout yet.</p></div>`;
      return;
    }

    sessionId = data.session_id;
    exercises = data.workout.exercises;
    render();
  }

  function render() {
    const container = document.getElementById('main-content');
    container.innerHTML = '';

    exercises.forEach((ex, i) => {
      const allLogged = ex.planned_sets.every(ps => ps.executed);
      const icon = allLogged ? '✅' : '⬜';

      const card = document.createElement('div');
      card.className = 'exercise-card';
      card.id = `card-${ex.id}`;

      card.innerHTML = `
        <div class="card-title" onclick="toggleCard(${ex.id})">
          <div class="card-title-left">
            <span class="status-icon" id="icon-${ex.id}">${icon}</span>
            <div>
              <div class="ex-num">Exercise ${i + 1}</div>
              <div class="ex-name">${esc(ex.description)}</div>
            </div>
          </div>
          <span class="chevron" id="chev-${ex.id}">›</span>
        </div>
        <div class="card-body" id="body-${ex.id}">
          ${buildSetsHtml(ex)}
          <div class="divider"></div>
          <div class="comment-label">Comment (optional)</div>
          <textarea class="comment-input" id="comment-${ex.id}"
            placeholder="How did it feel?">${ex.comment || ''}</textarea>
          <button class="btn-log" onclick="logExercise(${ex.id})">Save</button>
        </div>`;

      container.appendChild(card);
    });

    updateCompleteButton();
  }

  function buildSetsHtml(ex) {
    if (ex.planned_sets.length === 0) return '<p style="color:var(--hint);font-size:13px">No sets planned.</p>';

    let html = `<div class="sets-grid" style="margin-top:8px">
      <span class="col-head"></span>
      <span class="col-head">Reps</span>
      <span class="col-head">Weight kg</span>`;

    ex.planned_sets.forEach(ps => {
      const execReps   = ps.executed?.reps   ?? '';
      const execWeight = ps.executed?.weight ?? '';
      const loggedClass = ps.executed ? 'logged' : '';
      const plannedReps   = ps.reps   != null ? `plan: ${ps.reps}`   : '';
      const plannedWeight = ps.weight != null ? `plan: ${ps.weight}` : '';

      html += `
        <span class="set-num">${ps.set_number}</span>
        <div class="set-input-wrap">
          ${plannedReps ? `<span class="set-planned">${plannedReps}</span>` : ''}
          <input class="set-input ${loggedClass}" type="number" min="0"
            id="reps-${ps.id}" value="${execReps}" placeholder="—"
            style="${plannedReps ? 'margin-top:18px' : ''}">
        </div>
        <div class="set-input-wrap">
          ${plannedWeight ? `<span class="set-planned">${plannedWeight}</span>` : ''}
          <input class="set-input ${loggedClass}" type="number" min="0" step="0.5"
            id="wt-${ps.id}" value="${execWeight}" placeholder="—"
            style="${plannedWeight ? 'margin-top:18px' : ''}">
        </div>`;
    });

    html += '</div>';
    return html;
  }

  function toggleCard(exId) {
    const body = document.getElementById(`body-${exId}`);
    const chev = document.getElementById(`chev-${exId}`);
    const isOpen = body.classList.contains('open');
    document.querySelectorAll('.card-body').forEach(b => b.classList.remove('open'));
    document.querySelectorAll('.chevron').forEach(c => c.classList.remove('open'));
    if (!isOpen) { body.classList.add('open'); chev.classList.add('open'); }
  }

  async function logExercise(exId) {
    const ex = exercises.find(e => e.id === exId);
    if (!ex) return;

    for (const ps of ex.planned_sets) {
      const repsVal   = document.getElementById(`reps-${ps.id}`)?.value;
      const weightVal = document.getElementById(`wt-${ps.id}`)?.value;
      await fetch('/api/sets/log', {
        method: 'POST', headers: HJ,
        body: JSON.stringify({
          session_id: sessionId, planned_set_id: ps.id,
          actual_reps:   repsVal   ? parseInt(repsVal)    : null,
          actual_weight: weightVal ? parseFloat(weightVal) : null,
        }),
      });
      ps.executed = {
        reps:   repsVal   ? parseInt(repsVal)    : null,
        weight: weightVal ? parseFloat(weightVal) : null,
      };
    }

    const comment = document.getElementById(`comment-${exId}`)?.value.trim();
    if (comment) {
      await fetch('/api/comments', {
        method: 'POST', headers: HJ,
        body: JSON.stringify({ session_id: sessionId, exercise_id: exId, comment }),
      });
      ex.comment = comment;
    }

    document.getElementById(`icon-${exId}`).textContent = '✅';
    ex.planned_sets.forEach(ps => {
      document.getElementById(`reps-${ps.id}`)?.classList.add('logged');
      document.getElementById(`wt-${ps.id}`)?.classList.add('logged');
    });

    updateCompleteButton();
    document.getElementById(`body-${exId}`)?.classList.remove('open');
    document.getElementById(`chev-${exId}`)?.classList.remove('open');
  }

  function updateCompleteButton() {
    const allDone = exercises.every(ex => ex.planned_sets.every(ps => ps.executed));
    document.getElementById('btn-complete').disabled = !allDone;
  }

  async function completeWorkout() {
    const doComplete = async () => {
      const res = await fetch(`/api/sessions/${sessionId}/complete`, {
        method: 'POST', headers: HJ, body: JSON.stringify({}),
      });
      if (res.ok) {
        document.getElementById('main-content').innerHTML =
          `<div class="done-banner">🎉 Workout complete! Great job!</div>`;
        document.getElementById('btn-complete').style.display = 'none';
        historyLoaded = false; // reset so history reloads next time
        if (tg.initDataUnsafe?.user) tg.close();
      }
    };

    if (tg.initDataUnsafe?.user) {
      tg.showConfirm('Mark this workout as complete?', (confirmed) => { if (confirmed) doComplete(); });
    } else {
      if (confirm('Mark this workout as complete?')) doComplete();
    }
  }

  // ── History tab ───────────────────────────────────────────────────────────

  async function loadHistory() {
    historyLoaded = true;
    const container = document.getElementById('history-content');
    const res = await fetch('/api/history', { headers: H });
    if (!res.ok) { container.innerHTML = `<div class="empty"><p style="color:var(--red)">Failed to load history.</p></div>`; return; }
    const sessions = await res.json();

    if (sessions.length === 0) {
      container.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>No completed workouts yet.</p></div>`;
      return;
    }

    container.innerHTML = sessions.map(s => {
      const date = new Date(s.completed_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
      return `
        <div class="history-card">
          <div class="history-card-title" onclick="toggleHistory(${s.session_id}, this)">
            <div>
              <div class="history-date">${date}</div>
              <div class="history-meta">${s.exercise_count} exercise${s.exercise_count !== 1 ? 's' : ''}</div>
            </div>
            <span class="chevron" id="hchev-${s.session_id}">›</span>
          </div>
          <div class="history-body" id="hbody-${s.session_id}">
            <div class="spinner" style="padding:20px">Loading…</div>
          </div>
        </div>`;
    }).join('');
  }

  async function toggleHistory(sessionId, titleEl) {
    const body = document.getElementById(`hbody-${sessionId}`);
    const chev = document.getElementById(`hchev-${sessionId}`);
    const isOpen = body.classList.contains('open');

    // Close all
    document.querySelectorAll('.history-body').forEach(b => b.classList.remove('open'));
    document.querySelectorAll('#history-content .chevron').forEach(c => c.classList.remove('open'));

    if (!isOpen) {
      body.classList.add('open');
      chev.classList.add('open');
      if (body.dataset.loaded !== 'true') {
        const res = await fetch(`/api/sessions/${sessionId}`, { headers: H });
        if (!res.ok) { body.innerHTML = '<p style="color:var(--red);padding:8px 0">Failed to load.</p>'; return; }
        const data = await res.json();
        body.innerHTML = renderSessionDetail(data);
        body.dataset.loaded = 'true';
      }
    }
  }

  function renderSessionDetail(data) {
    let html = '';
    data.workout.exercises.forEach((ex, i) => {
      html += `<div class="subtitle">Exercise ${i + 1} — ${esc(ex.description)}</div>`;
      if (ex.planned_sets.length > 0) {
        html += `<div class="history-sets" style="margin-top:10px">
          <span class="col-head">#</span>
          <span class="col-head">Reps</span>
          <span class="col-head">Weight</span>
          <span class="col-head">vs prev</span>`;
        ex.planned_sets.forEach(ps => {
          const reps   = ps.executed?.reps   != null ? ps.executed.reps   : '—';
          const weight = ps.executed?.weight != null ? `${ps.executed.weight}kg` : '—';
          const delta  = buildDelta(ps.executed, ps.previous);
          html += `
            <span class="set-num">${ps.set_number}</span>
            <span>${reps}</span>
            <span>${weight}</span>
            <span>${delta}</span>`;
        });
        html += `</div>`;
      }
      if (ex.comment) {
        html += `<div style="font-size:13px;color:var(--hint);margin-bottom:10px">💬 ${esc(ex.comment)}</div>`;
      }
    });
    return html || '<p style="color:var(--hint);font-size:13px">No data.</p>';
  }

  function buildDelta(current, prev) {
    if (!current || !prev) return '<span style="color:var(--hint)">—</span>';
    const parts = [];
    if (current.reps != null && prev.reps != null && current.reps !== prev.reps) {
      const d = current.reps - prev.reps;
      parts.push(`<span class="delta ${d > 0 ? 'up' : 'down'}">${d > 0 ? '+' : ''}${d}r</span>`);
    }
    if (current.weight != null && prev.weight != null && current.weight !== prev.weight) {
      const d = +(current.weight - prev.weight).toFixed(2);
      parts.push(`<span class="delta ${d > 0 ? 'up' : 'down'}">${d > 0 ? '+' : ''}${d}kg</span>`);
    }
    return parts.length ? parts.join(' ') : '<span style="color:var(--hint)">—</span>';
  }

  // ── Helpers ───────────────────────────────────────────────────────────────

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showError(msg) {
    document.getElementById('main-content').innerHTML =
      `<div class="empty"><p style="color:var(--red)">${msg}</p></div>`;
  }

  init();
</script>
</body>
</html>
