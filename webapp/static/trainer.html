<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Workout Builder</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="/static/sortable.min.js"></script>
  <style>
    :root {
      --bg:     var(--tg-theme-bg-color, #ffffff);
      --bg2:    var(--tg-theme-secondary-bg-color, #f1f1f1);
      --text:   var(--tg-theme-text-color, #000000);
      --hint:   var(--tg-theme-hint-color, #999999);
      --btn:    var(--tg-theme-button-color, #2481cc);
      --btn-t:  var(--tg-theme-button-text-color, #ffffff);
      --link:   var(--tg-theme-link-color, #2481cc);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      padding: 16px;
      padding-bottom: 88px;
    }

    /* ── Header ── */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .badge {
      font-size: 12px;
      background: var(--bg2);
      color: var(--hint);
      padding: 3px 8px;
      border-radius: 20px;
    }

    /* ── Exercise cards ── */
    .exercise-card {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .exercise-num { color: var(--hint); font-size: 13px; margin-bottom: 2px; }
    .exercise-name { font-weight: 600; font-size: 15px; line-height: 1.3; }
    .btn-delete {
      background: none;
      border: none;
      color: var(--hint);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
    }
    .btn-delete:hover { color: #ff3b30; }
    .exercise-card { cursor: grab; user-select: none; -webkit-user-select: none; }
    .exercise-card:active { cursor: grabbing; }
    .sets-table, .sets-table * { user-select: none; -webkit-user-select: none; }
    .sortable-ghost { opacity: 0.4; }

    /* ── Sets table ── */
    .sets-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .sets-table th {
      text-align: left;
      color: var(--hint);
      font-weight: 500;
      padding: 0 12px 6px 0;
    }
    .sets-table td { padding: 3px 12px 3px 0; }
    .sets-table tr:last-child td { padding-bottom: 0; }
    .pill {
      display: inline-block;
      background: var(--bg);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 13px;
      min-width: 40px;
      text-align: center;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      color: var(--hint);
      padding: 40px 0 24px;
    }
    .empty-icon { font-size: 40px; margin-bottom: 8px; }
    .empty p { font-size: 14px; line-height: 1.5; }

    /* ── Add exercise form ── */
    .form-card {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }
    .form-title { font-weight: 600; margin-bottom: 12px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; color: var(--hint); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input {
      width: 100%;
      background: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    .field input::placeholder { color: var(--hint); }

    .sets-editor { margin-bottom: 8px; }
    .set-row {
      display: grid;
      grid-template-columns: 28px 1fr 1fr 28px;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .set-row .set-num { color: var(--hint); font-size: 13px; text-align: center; }
    .set-row input {
      background: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 14px;
      width: 100%;
      outline: none;
    }
    .set-row input::placeholder { color: var(--hint); }
    .set-row .btn-rm-set {
      background: none;
      border: none;
      color: var(--hint);
      font-size: 18px;
      cursor: pointer;
      text-align: center;
      line-height: 1;
    }
    .set-row .btn-rm-set:hover { color: #ff3b30; }
    .sets-header {
      display: grid;
      grid-template-columns: 28px 1fr 1fr 28px;
      gap: 8px;
      margin-bottom: 4px;
    }
    .sets-header span { font-size: 12px; color: var(--hint); text-transform: uppercase; letter-spacing: 0.5px; }

    .btn-add-set {
      width: 100%;
      background: none;
      border: 1px dashed var(--hint);
      border-radius: 8px;
      padding: 8px;
      color: var(--hint);
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .form-actions { display: flex; gap: 8px; }
    .btn { border: none; border-radius: 10px; padding: 11px 16px; font-size: 15px; font-weight: 600; cursor: pointer; flex: 1; }
    .btn-primary { background: var(--btn); color: var(--btn-t); }
    .btn-ghost { background: var(--bg); color: var(--text); font-weight: 400; }

    /* ── Bottom bar ── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: var(--bg);
      border-top: 1px solid var(--bg2);
      display: flex;
      gap: 8px;
    }
    .bottom-bar .btn { margin: 0; }
    .btn-outline {
      background: var(--bg2);
      color: var(--text);
      font-weight: 500;
    }

    /* ── Misc ── */
    .divider { height: 1px; background: var(--bg2); margin: 4px 0 12px; }
    .spinner { text-align: center; padding: 40px; color: var(--hint); }
  </style>
</head>
<body>

<div class="header">
  <h1>📋 Workout Builder</h1>
  <span class="badge" id="ex-count">0 exercises</span>
</div>
<div id="published-banner" style="display:none;background:var(--bg2);border-radius:10px;padding:10px 12px;margin-bottom:16px;font-size:13px;color:var(--hint)">
  ✅ Published — changes are live. Use <strong>Save &amp; Notify</strong> to alert your trainee.
</div>

<div id="main-content">
  <div class="spinner">Loading…</div>
</div>

<div class="bottom-bar">
  <button class="btn btn-outline" onclick="showForm()">＋ Add Exercise</button>
  <button class="btn btn-primary" id="btn-action" onclick="primaryAction()">Publish</button>
  <button class="btn btn-outline" id="btn-new-workout" style="display:none" onclick="newWorkout()">New</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();

  let workoutId = null;
  let isPublished = false;
  let exercises = [];
  let setCounter = 0;
  let formVisible = false;

  // ── Auth headers ──────────────────────────────────────────────────────────

  function authHeaders(json = false) {
    const h = { 'ngrok-skip-browser-warning': '1' };
    if (tg.initData) {
      h['X-Telegram-Init-Data'] = tg.initData;
    } else {
      const params = new URLSearchParams(location.search);
      const token = params.get('token');
      const debugId = params.get('user_id') || tg.initDataUnsafe?.user?.id;
      if (token) h['X-Auth-Token'] = token;
      else if (debugId) h['X-Debug-User-Id'] = String(debugId);
    }
    if (json) h['Content-Type'] = 'application/json';
    return h;
  }

  // ── Init ─────────────────────────────────────────────────────────────────

  async function init() {
    const res = await fetch(`/api/workout/draft`, { headers: authHeaders() });
    if (!res.ok) { showError('Failed to load workout'); return; }
    const data = await res.json();
    workoutId = data.workout_id;
    isPublished = data.is_published;
    exercises = data.exercises;
    document.getElementById('published-banner').style.display = isPublished ? '' : 'none';
    document.getElementById('btn-action').textContent = isPublished ? 'Save & Notify' : 'Publish';
    document.getElementById('btn-new-workout').style.display = isPublished ? '' : 'none';
    renderExercises();
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function renderExercises() {
    document.getElementById('ex-count').textContent =
      `${exercises.length} exercise${exercises.length !== 1 ? 's' : ''}`;

    const container = document.getElementById('main-content');

    if (formVisible) {
      const existing = document.getElementById('exercise-list');
      if (existing) existing.remove();
      const list = buildExerciseList();
      container.insertBefore(list, container.firstChild);
      initSortable();
      return;
    }

    container.innerHTML = '';
    container.appendChild(buildExerciseList());
    initSortable();
  }

  function initSortable() {
    const list = document.getElementById('exercise-list');
    if (!list || exercises.length < 2) return;
    Sortable.create(list, {
      animation: 150,
      forceFallback: true,
      filter: '.btn-delete',
      onEnd: async ({ oldIndex, newIndex }) => {
        if (oldIndex === newIndex) return;
        const moved = exercises.splice(oldIndex, 1)[0];
        exercises.splice(newIndex, 0, moved);
        const ids = exercises.map(e => e.id);
        await fetch(`/api/workout/${workoutId}/exercises/reorder`, {
          method: 'POST',
          headers: authHeaders(true),
          body: JSON.stringify({ exercise_ids: ids }),
        });
        renderExercises();
      },
    });
  }

  function buildExerciseList() {
    const wrap = document.createElement('div');
    wrap.id = 'exercise-list';

    if (exercises.length === 0) {
      wrap.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🏋️</div>
          <p>No exercises yet.<br>Tap <strong>+ Add Exercise</strong> to start.</p>
        </div>`;
      return wrap;
    }

    exercises.forEach((ex, i) => {
      const card = document.createElement('div');
      card.className = 'exercise-card';

      const setsHtml = ex.planned_sets.length === 0
        ? '<span style="color:var(--hint);font-size:13px">No sets</span>'
        : `<table class="sets-table">
            <tr><th>Set</th><th>Reps</th><th>Weight</th></tr>
            ${ex.planned_sets.map(s => `
              <tr>
                <td>${s.set_number}</td>
                <td><span class="pill">${s.reps ?? '—'}</span></td>
                <td><span class="pill">${s.weight != null ? s.weight + ' kg' : '—'}</span></td>
              </tr>`).join('')}
           </table>`;

      card.dataset.id = ex.id;
      card.innerHTML = `
        <div class="card-header">
          <div>
            <div class="exercise-num">Exercise ${i + 1}</div>
            <div class="exercise-name">${esc(ex.description)}</div>
          </div>
          <button class="btn-delete" onclick="deleteExercise(${ex.id})">×</button>
        </div>
        ${setsHtml}`;
      card.addEventListener('selectstart', e => e.preventDefault());
      wrap.appendChild(card);
    });

    return wrap;
  }

  // ── Add exercise form ─────────────────────────────────────────────────────

  function showForm() {
    if (formVisible) return;
    formVisible = true;
    setCounter = 0;

    const form = document.createElement('div');
    form.className = 'form-card';
    form.id = 'add-form';
    form.innerHTML = `
      <div class="form-title">New Exercise</div>
      <div class="field">
        <label>Name</label>
        <input type="text" id="ex-name" placeholder="e.g. Bench Press" autofocus>
      </div>
      <div class="field">
        <label>Sets</label>
        <div class="sets-header">
          <span></span><span>Reps</span><span>Weight (kg)</span><span></span>
        </div>
        <div class="sets-editor" id="sets-editor"></div>
        <button class="btn-add-set" onclick="addSetRow()">＋ Add set</button>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="hideForm()">Cancel</button>
        <button class="btn btn-primary" onclick="saveExercise()">Save</button>
      </div>`;

    document.getElementById('main-content').appendChild(form);
    addSetRow(); addSetRow(); addSetRow();
    document.getElementById('ex-name').focus();
  }

  function hideForm() {
    formVisible = false;
    document.getElementById('add-form')?.remove();
  }

  function addSetRow() {
    setCounter++;
    const n = setCounter;
    const row = document.createElement('div');
    row.className = 'set-row';
    row.id = `sr-${n}`;
    row.innerHTML = `
      <span class="set-num" id="sn-${n}">${document.querySelectorAll('.set-row').length + 1}</span>
      <input type="number" id="reps-${n}" placeholder="—" min="1">
      <input type="number" id="wt-${n}"   placeholder="—" min="0" step="0.5">
      <button class="btn-rm-set" onclick="removeSetRow(${n})">×</button>`;
    document.getElementById('sets-editor').appendChild(row);
  }

  function removeSetRow(n) {
    document.getElementById(`sr-${n}`)?.remove();
    // Renumber
    document.querySelectorAll('.set-row').forEach((r, i) => {
      r.querySelector('.set-num').textContent = i + 1;
    });
  }

  async function saveExercise() {
    const name = document.getElementById('ex-name').value.trim();
    if (!name) { tg.showAlert('Please enter an exercise name.'); return; }

    const rows = document.querySelectorAll('.set-row');
    if (rows.length === 0) { tg.showAlert('Add at least one set.'); return; }

    const sets = Array.from(rows).map(row => {
      const n = row.id.replace('sr-', '');
      const reps   = document.getElementById(`reps-${n}`)?.value;
      const weight = document.getElementById(`wt-${n}`)?.value;
      return {
        reps:   reps   ? parseInt(reps)    : null,
        weight: weight ? parseFloat(weight) : null,
      };
    });

    const res = await fetch(`/api/workout/${workoutId}/exercises`, {
      method: 'POST',
      headers: authHeaders(true),
      body: JSON.stringify({ description: name, sets }),
    });

    if (res.ok) {
      const data = await res.json();
      exercises = data.exercises;
      hideForm();
      renderExercises();
    } else {
      tg.showAlert('Failed to save exercise.');
    }
  }

  // ── Delete exercise ───────────────────────────────────────────────────────

  async function deleteExercise(id) {
    const doDelete = async (confirmed) => {
      if (!confirmed) return;
      const res = await fetch(`/api/exercises/${id}`, { method: 'DELETE', headers: authHeaders() });
      if (res.ok) {
        const data = await res.json();
        exercises = data.exercises;
        renderExercises();
      }
    };
    if (tg.initDataUnsafe?.user) tg.showConfirm('Remove this exercise?', doDelete);
    else doDelete(confirm('Remove this exercise?'));
  }

  // ── Publish / Save & Notify ───────────────────────────────────────────────

  async function primaryAction() {
    if (exercises.length === 0) {
      tg.showAlert('Add at least one exercise first.');
      return;
    }
    if (isPublished) {
      const msg = 'Notify your trainee that the workout has changed?';
      const doNotify = async (confirmed) => {
        if (!confirmed) return;
        const res = await fetch(`/api/workout/${workoutId}/notify`, {
          method: 'POST', headers: authHeaders(true), body: JSON.stringify({}),
        });
        if (res.ok) {
          if (tg.initDataUnsafe?.user) tg.showAlert('Trainee notified! ✅', () => tg.close());
          else alert('Trainee notified! ✅');
        }
      };
      if (tg.initDataUnsafe?.user) tg.showConfirm(msg, doNotify);
      else doNotify(confirm(msg));
    } else {
      const msg = 'Publish this workout? Your trainee will be notified.';
      const doPublish = async (confirmed) => {
        if (!confirmed) return;
        const res = await fetch(`/api/workout/${workoutId}/publish`, {
          method: 'POST', headers: authHeaders(true), body: JSON.stringify({}),
        });
        if (res.ok) {
          if (tg.initDataUnsafe?.user) tg.showAlert('Workout published! ✅', () => tg.close());
          else alert('Workout published! ✅');
        }
      };
      if (tg.initDataUnsafe?.user) tg.showConfirm(msg, doPublish);
      else doPublish(confirm(msg));
    }
  }

  async function newWorkout() {
    const doCreate = async (confirmed) => {
      if (!confirmed) return;
      const res = await fetch('/api/workout/new', { method: 'POST', headers: authHeaders(true), body: JSON.stringify({}) });
      if (res.ok) {
        const data = await res.json();
        workoutId = data.workout_id;
        isPublished = false;
        exercises = [];
        document.getElementById('published-banner').style.display = 'none';
        document.getElementById('btn-action').textContent = 'Publish';
        document.getElementById('btn-new-workout').style.display = 'none';
        renderExercises();
      }
    };
    const msg = 'Start a new workout? The published one stays active until you publish the new one.';
    if (tg.initDataUnsafe?.user) tg.showConfirm(msg, doCreate);
    else doCreate(confirm(msg));
  }

  // ── Helpers ───────────────────────────────────────────────────────────────

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showError(msg) {
    document.getElementById('main-content').innerHTML =
      `<div class="empty"><p style="color:#ff3b30">${msg}</p></div>`;
  }

  init();
</script>
</body>
</html>
